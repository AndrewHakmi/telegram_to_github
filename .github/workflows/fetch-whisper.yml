name: Fetch Whisper ASR

on:
  push:
    paths:
      - '.github/workflows/fetch-whisper.yml'

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Download whisperfile
        run: |
          curl -L --fail --retry 5 -o whisper-small.llamafile https://huggingface.co/Mozilla/whisperfile/resolve/main/whisper-small.llamafile
          chmod +x whisper-small.llamafile
          sha256sum whisper-small.llamafile
      - name: Upload whisperfile
        uses: actions/upload-artifact@v4
        with:
          name: whisper-small-llamafile
          path: whisper-small.llamafile
          compression-level: 0
      - name: Publish run id
        run: |
          echo '${{ github.run_id }}' > asr_small_run_id.txt
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add asr_small_run_id.txt
          git commit -m 'chore: publish small ASR workflow run id'
          git push
